name: Build & Release Android

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: EAS Build (APK + AAB)
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create GitHub Release

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 4. Setup Expo / EAS ──────────────────────────────────────────────────
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── 5. Build AAB (release) ───────────────────────────────────────────────
      - name: Build AAB (release)
        id: build_aab
        run: |
          # Run EAS build, wait for completion, output JSON to file
          eas build \
            --platform android \
            --profile release \
            --non-interactive \
            --json \
            --wait \
            2>/dev/null > eas_aab_output.json || true

          # Extract build URL from JSON array
          BUILD_URL=$(jq -r 'if type == "array" then .[0].artifacts.buildUrl else .artifacts.buildUrl end // empty' eas_aab_output.json 2>/dev/null || echo "")
          echo "aab_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "AAB build URL: $BUILD_URL"

      # ── 6. Build APK (release-apk) ───────────────────────────────────────────
      - name: Build APK (release-apk)
        id: build_apk
        run: |
          eas build \
            --platform android \
            --profile release-apk \
            --non-interactive \
            --json \
            --wait \
            2>/dev/null > eas_apk_output.json || true

          BUILD_URL=$(jq -r 'if type == "array" then .[0].artifacts.buildUrl else .artifacts.buildUrl end // empty' eas_apk_output.json 2>/dev/null || echo "")
          echo "apk_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "APK build URL: $BUILD_URL"

      # ── 7. Download artifacts ────────────────────────────────────────────────
      - name: Download AAB
        if: steps.build_aab.outputs.aab_url != ''
        run: |
          curl -L "${{ steps.build_aab.outputs.aab_url }}" \
            -o "yamicbtmobile-${{ github.ref_name }}.aab"

      - name: Download APK
        if: steps.build_apk.outputs.apk_url != ''
        run: |
          curl -L "${{ steps.build_apk.outputs.apk_url }}" \
            -o "yamicbtmobile-${{ github.ref_name }}.apk"

      # ── 8. Extract release notes from CHANGELOG (optional) ───────────────────
      - name: Get release notes
        id: release_notes
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?${TAG#v}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # ── 9. Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "YamiCBT Mobile ${{ github.ref_name }}"
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            yamicbtmobile-${{ github.ref_name }}.aab
            yamicbtmobile-${{ github.ref_name }}.apk
          fail_on_unmatched_files: false
