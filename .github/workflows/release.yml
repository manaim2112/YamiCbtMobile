name: Build & Release Android

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  build:
    name: Gradle Build (APK + AAB)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 17 ─────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Setup Node.js 24 ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # ── 4. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 5. Setup Gradle ──────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 6. Prebuild native Android project ───────────────────────────────────
      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      # ── 7. Decode keystore from secrets ──────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      # ── 8. Create keystore config ────────────────────────────────────────────
      - name: Create keystore config
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/keystore.jks
          EOF

      # ── 9. Build Release APK ────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # ── 10. Build Release AAB ───────────────────────────────────────────────
      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      # ── 11. Rename artifacts ────────────────────────────────────────────────
      - name: Rename artifacts
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
            yamicbtmobile-${{ github.ref_name }}.apk
          mv android/app/build/outputs/bundle/release/app-release.aab \
            yamicbtmobile-${{ github.ref_name }}.aab
          ls -lh yamicbtmobile-*

      # ── 12. Get release notes ───────────────────────────────────────────────
      - name: Get release notes
        id: release_notes
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \\[?${TAG#v}\\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          fi
          [ -z "$NOTES" ] && NOTES="Release ${TAG}"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # ── 13. Create GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "YamiCBT Mobile ${{ github.ref_name }}"
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            yamicbtmobile-${{ github.ref_name }}.apk
            yamicbtmobile-${{ github.ref_name }}.aab
          fail_on_unmatched_files: false
